<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Facebook</title>

<link rel="stylesheet" href="fb.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<nav>

<div class="logo">

Facebook

</div>

<div class="search">

<input type="text"
placeholder="Search Facebook">

</div>

<div class="icons">

<i class="fa-solid fa-house"></i>

<i class="fa-solid fa-user-group"></i>

<i class="fa-solid fa-bell"></i>

<i class="fa-solid fa-moon"
id="theme"></i>

</div>

</nav>

<div class="container">

<div class="left">

<div class="profile">

<h2 id="welcome"></h2>

<p>Welcome Back ❤️</p>

</div>

</div>

<div class="middle">

<div class="createPost">

<textarea
id="postText"
placeholder="What's on your mind?"></textarea>

<button id="postBtn">

Post

</button>

</div>

<div id="posts"></div>

</div>

<div class="right">

<h3>Contacts</h3>

<p>👤 Rahul</p>

<p>👤 Priya</p>

<p>👤 Aryan</p>

<p>👤 Neha</p>

</div>
<div class="successMessage">

    <h2>Your account is now created successfully 🎉</h2>

    <p id="welcome"></p>

</div>

</div>

<script src="fb.js"></script>

</body>

</html>
